[project]
name = "command-center"
version = "1.0.0"
description = "Command-Center: Global workflow commands for AI coding assistants. Bootstrap /do-the-thing, /commit, and /init to Opencode and Antigravity."
requires-python = ">=3.11"
dependencies = []
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Brimdor"}
]
keywords = ["ai", "workflow", "opencode", "antigravity", "sdd", "spec-driven-development"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Build Tools",
]

[project.urls]
Homepage = "https://github.com/brimdor/command-center"
Repository = "https://github.com/brimdor/command-center"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["scripts"]

[tool.hatch.build.targets.sdist]
include = [
    "do-the-thing.md",
    "commit.md",
    "init.md",
    ".do-the-thing/**",
    "scripts/**",
    "README.md",
]
